name: Despliegue Automático (Vercel)

on:
  push:
    branches:
      - main # Cambia a 'coding' si prefieres desplegar desde tu otra rama

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Vercel CLI Globalmente
        run: npm install -g vercel

      - name: Compilar proyecto (Build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ==== DESPLIEGUE FORZANDO LA CARPETA DIST EN EL COMANDO ====
      - name: Desplegar en Producción
        run: vercel --token="${{ secrets.VERCEL_TOKEN }}" --prod --yes --archive=tgz
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
